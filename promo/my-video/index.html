<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #000; }
    body { font-family: "Montserrat", system-ui, sans-serif; }
    #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #f5f0eb; }
    #root > div[data-composition-src] { position: absolute; inset: 0; }
    #bg { position: absolute; inset: 0; background: #f5f0eb; }
    .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%); pointer-events: none; z-index: 50; }
    .trans-overlay { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 100; }
    .fade-to-black { position: absolute; inset: 0; background: #000; opacity: 0; pointer-events: none; z-index: 200; }
  </style>
</head>
<body>
  <div id="root" data-composition-id="root" data-start="0" data-duration="40" data-width="1920" data-height="1080">

    <div id="bg"></div>
    <div class="vignette" id="vignette"></div>

    <!-- Scene 1: Browser chaos (0-4.5s) -->
    <div id="s1" data-composition-id="s1-browser" data-composition-src="compositions/s1-browser.html" data-start="0" data-duration="5" data-track-index="1" data-width="1920" data-height="1080"></div>

    <!-- Transition 1: zoom-through with blur (4.5-4.9) -->
    <div id="trans-1" class="clip trans-overlay" data-start="4.5" data-duration="0.4" data-track-index="2"></div>

    <!-- Scene 2: Dashboard hero (5-9.5s) -->
    <div id="s2" data-composition-id="s2-dashboard" data-composition-src="compositions/s2-dashboard.html" data-start="5" data-duration="5" data-track-index="1" data-width="1920" data-height="1080"></div>

    <!-- Transition 2: squeeze (9.5-10.0) -->
    <div id="trans-2" class="clip trans-overlay" data-start="9.5" data-duration="0.5" data-track-index="2"></div>

    <!-- Scene 3+4 merged: AI + Stack (10-32s) -->
    <div id="s3" data-composition-id="s3-merged" data-composition-src="compositions/s3-merged.html" data-start="10" data-duration="22" data-track-index="1" data-width="1920" data-height="1080"></div>

    <!-- Transition 3: blur-crossfade (31.5-32.1) -->
    <div id="trans-3" class="clip trans-overlay" data-start="31.5" data-duration="0.6" data-track-index="2"></div>

    <!-- Scene 5: Convergence (32-40s) -->
    <div id="s4" data-composition-id="s4-convergence" data-composition-src="compositions/s4-convergence.html" data-start="32" data-duration="8" data-track-index="1" data-width="1920" data-height="1080"></div>

    <!-- Fade to black -->
    <div id="fade-out" class="clip fade-to-black" data-start="39" data-duration="1" data-track-index="2"></div>

    <!-- Audio — narrators on track 6 (non-overlapping) -->
    <audio id="audio-s1" data-start="0.3" data-duration="3.691" data-track-index="6" src="audio/s1-student.wav" data-volume="1.0"></audio>
    <audio id="audio-s2" data-start="4.0" data-duration="3.392" data-track-index="6" src="audio/s2-narrator.wav" data-volume="1.0"></audio>
    <audio id="audio-s3-student" data-start="10.3" data-duration="2.07" data-track-index="6" src="audio/s3-student.wav" data-volume="1.0"></audio>
    <audio id="audio-s3-narrator" data-start="12.8" data-duration="8.064" data-track-index="6" src="audio/s3-narrator.wav" data-volume="1.0"></audio>
    <audio id="audio-s4" data-start="22" data-duration="5.4" data-track-index="6" src="audio/s4-narrator.wav" data-volume="1.0"></audio>
    <audio id="audio-s5" data-start="32.5" data-duration="3.669" data-track-index="6" src="audio/s5-narrator.wav" data-volume="1.0"></audio>

    <!-- S1 SFX -->
    <audio id="audio-s1-notify-1" data-start="0.5" data-duration="0.35" data-track-index="13" src="audio/s1-notify.wav" data-volume="1.0"></audio>
    <audio id="audio-s1-typing-1" data-start="0.8" data-duration="0.8" data-track-index="14" src="audio/s1-typing.wav" data-volume="1.0"></audio>
    <audio id="audio-s1-click-1" data-start="1.5" data-duration="0.02" data-track-index="15" src="audio/s1-click.wav" data-volume="1.0"></audio>
    <audio id="audio-s1-notify-2" data-start="2.0" data-duration="0.35" data-track-index="16" src="audio/s1-notify.wav" data-volume="1.0"></audio>
    <audio id="audio-s1-typing-2" data-start="2.5" data-duration="0.8" data-track-index="17" src="audio/s1-typing.wav" data-volume="1.0"></audio>
    <audio id="audio-s1-click-2" data-start="3.0" data-duration="0.02" data-track-index="18" src="audio/s1-click.wav" data-volume="1.0"></audio>
    <audio id="audio-s1-sigh" data-start="3.5" data-duration="1.0" data-track-index="19" src="audio/s1-sigh.wav" data-volume="1.0"></audio>

    <!-- BGM -->
    <audio id="audio-bgm-glitchy" data-start="0" data-duration="5.0" data-track-index="12" src="audio/glitchy-bgm.wav" data-volume="1.0"></audio>
    <audio id="audio-bgm-whoosh" data-start="5.0" data-duration="0.5" data-track-index="12" src="audio/soft-whoosh.wav" data-volume="1.0"></audio>
    <audio id="audio-bgm-ambient" data-start="5.5" data-duration="3.0" data-track-index="12" src="audio/ambient-fill.wav" data-volume="1.0"></audio>
    <audio id="audio-bgm-tech" data-start="8.5" data-duration="20.0" data-track-index="12" src="audio/tech-bgm.wav" data-volume="1.0"></audio>
    <audio id="audio-bgm-epic" data-start="28.5" data-duration="10.0" data-track-index="12" src="audio/epic-bgm.wav" data-volume="1.0"></audio>

  </div>

  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    // === Full-Screen Motion: Continuous background color ===
    // cream → navy (S1 browser: 0-4.5)
    tl.to("#bg", { backgroundColor: "#0a1628", duration: 4.5, ease: "sine.inOut" }, 0);
    // navy → purple (S2 dashboard: 4.5-10)
    tl.to("#bg", { backgroundColor: "#1a0a30", duration: 5.5, ease: "sine.inOut" }, 4.5);
    // purple → deep purple (S3 AI chat phase)
    tl.to("#bg", { backgroundColor: "#120824", duration: 12, ease: "sine.inOut" }, 10);
    // deep purple → dark (S3 stack phase)
    tl.to("#bg", { backgroundColor: "#0a0a0f", duration: 10, ease: "sine.inOut" }, 22);
    // dark → final deep (S5 convergence)
    tl.to("#bg", { backgroundColor: "#050508", duration: 8, ease: "sine.inOut" }, 32);

    // === Vignette breathing ===
    tl.to("#vignette", { opacity: 0.92, duration: 2, yoyo: true, repeat: 19, ease: "sine.inOut" }, 0);

    // === Transition 1: zoom-through with blur (S1→S2) ===
    tl.set("#trans-1", { scale: 0, opacity: 0, filter: "blur(0px)", transformOrigin: "center center" }, 4.5);
    tl.to("#trans-1", { scale: 5, opacity: 1, filter: "blur(4px)", duration: 0.15, ease: "power3.in" }, 4.5);
    tl.to("#trans-1", { scale: 10, opacity: 0, filter: "blur(0px)", duration: 0.25, ease: "power2.out" }, 4.65);
    tl.set("#trans-1", { scale: 1, opacity: 0, filter: "blur(0px)" }, 4.9);

    // === Transition 2: squeeze (S2→S3 merged) ===
    tl.set("#trans-2", { scaleX: 0, scaleY: 1, opacity: 0, transformOrigin: "50% 50%" }, 9.5);
    tl.to("#trans-2", { scaleX: 1, opacity: 1, duration: 0.2, ease: "power3.inOut" }, 9.5);
    tl.to("#trans-2", { scaleX: 1.2, scaleY: 1, opacity: 0.5, duration: 0.1, ease: "power2.out" }, 9.7);
    tl.to("#trans-2", { scaleX: 0, scaleY: 0.8, opacity: 0, duration: 0.15, ease: "power2.inOut" }, 9.8);
    tl.set("#trans-2", { scaleX: 1, scaleY: 1, opacity: 0 }, 9.95);
    tl.set("#trans-2", { opacity: 0 }, 10.0);

    // === Transition 3: blur-crossfade (S3 merged→S5) ===
    tl.set("#trans-3", { opacity: 0, filter: "blur(0px)" }, 31.5);
    tl.to("#trans-3", { opacity: 1, filter: "blur(12px)", duration: 0.3, ease: "power1.inOut" }, 31.5);
    tl.to("#trans-3", { opacity: 0, filter: "blur(0px)", duration: 0.3, ease: "power1.inOut" }, 31.8);
    tl.set("#trans-3", { opacity: 0, filter: "blur(0px)" }, 32.1);

    // === Fade to black ===
    tl.to("#fade-out", { opacity: 1, duration: 1, ease: "power2.in" }, 39);

    window.__timelines["root"] = tl;
  </script>
</body>
</html>
