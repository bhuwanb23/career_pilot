    <div id="s4-f2" class="s4-f-card lilac"><span class="s4-f-icon">&#128200;</span><div class="s4-f-name">Job Match</div><span id="s4-live-2" class="s4-f-live"><span class="s4-f-live-dot"></span>LIVE</span><div class="s4-f-count"><span id="s4-cnt-2">0</span><span style="font-size:14px;color:rgba(255,255,255,0.5)">%</span></div><div class="s4-f-label">avg match score</div></div>

<script>
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({ paused: true });

["s4-ln-1","s4-ln-2","s4-ln-3","s4-ln-4","s4-ln-5","s4-ln-6"].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) { var len = el.getTotalLength(); el.style.strokeDasharray = len; el.style.strokeDashoffset = len; }
});

tl.to("#s4-glow-1", { scale: 1.08, duration: 2.0, yoyo: true, repeat: 4, ease: "sine.inOut" }, 0.9);
tl.to("#s4-glow-2", { scale: 1.06, duration: 2.5, yoyo: true, repeat: 3, ease: "sine.inOut" }, 2.0);
tl.to("#s4-progress-fill", { scaleX: 1, duration: 10, ease: "none" }, 0);

tl.fromTo("#s4-glow-1", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.9, ease: "expo.out" }, 0.3);
tl.fromTo("#s4-node-cp", { opacity: 0, y: -20, scale: 0.8 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.7)" }, 0.3);

var s4Nodes = ["#s4-node-rp","#s4-node-jm","#s4-node-oc","#s4-node-ik","#s4-node-an"];
var s4Lines = ["#s4-ln-2","#s4-ln-3","#s4-ln-4","#s4-ln-5","#s4-ln-6"];
tl.to("#s4-ln-1", { strokeDashoffset: 0, duration: 0.35, ease: "power2.out" }, 0.8);
s4Nodes.forEach(function(nodeId, i) {
  var t = 0.8 + i * 0.35;
  tl.to(s4Lines[i], { strokeDashoffset: 0, duration: 0.35, ease: "power2.out" }, t + 0.15);
  tl.fromTo(nodeId, { opacity: 0, y: -15, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "power3.out" }, t);
});

tl.to("#s4-stack", { opacity: 0, duration: 0.5, ease: "power2.in" }, 4.0);
tl.set("#s4-stack", { display: "none" }, 4.5);
tl.set("#s4-features", { display: "flex" }, 4.5);
tl.fromTo("#s4-glow-2", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6, ease: "expo.out" }, 4.3);

tl.fromTo("#s4-f1", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.45, ease: "expo.out" }, 5.0);
tl.fromTo("#s4-f2", { opacity: 0, x: -40 }, { opacity: 1, x: 0, duration: 0.45, ease: "power3.out" }, 5.1);
tl.fromTo("#s4-f3", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.45, ease: "back.out(1.2)" }, 5.2);
tl.fromTo("#s4-f4", { opacity: 0, x: 40 }, { opacity: 1, x: 0, duration: 0.45, ease: "power3.out" }, 5.3);
tl.fromTo("#s4-f5", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.45, ease: "expo.out" }, 5.4);

tl.to("#s4-live-1", { opacity: 1, duration: 0.2, ease: "power2.out" }, 6.0);
tl.to("#s4-live-2", { opacity: 1, duration: 0.2, ease: "power2.out" }, 6.1);
tl.to("#s4-live-3", { opacity: 1, duration: 0.2, ease: "power2.out" }, 6.2);
tl.to("#s4-live-4", { opacity: 1, duration: 0.2, ease: "power2.out" }, 6.3);
tl.to("#s4-live-5", { opacity: 1, duration: 0.2, ease: "power2.out" }, 6.4);

var s4c1 = document.getElementById("s4-cnt-1"), s4c1o = { val: 0 };
var s4c2 = document.getElementById("s4-cnt-2"), s4c2o = { val: 0 };
var s4c3 = document.getElementById("s4-cnt-3"), s4c3o = { val: 0 };
var s4c4 = document.getElementById("s4-cnt-4"), s4c4o = { val: 0 };
var s4c5 = document.getElementById("s4-cnt-5"), s4c5o = { val: 0 };
tl.to(s4c1o, { val: 1247, duration: 1.2, ease: "power2.out", onUpdate: function() { s4c1.innerText = Math.round(s4c1o.val).toLocaleString(); } }, 6.5);
tl.to(s4c2o, { val: 92, duration: 1.2, ease: "power2.out", onUpdate: function() { s4c2.innerText = Math.round(s4c2o.val); } }, 6.5);
tl.to(s4c3o, { val: 34, duration: 1.2, ease: "power2.out", onUpdate: function() { s4c3.innerText = Math.round(s4c3o.val).toLocaleString(); } }, 6.5);
tl.to(s4c4o, { val: 89, duration: 1.2, ease: "power2.out", onUpdate: function() { s4c4.innerText = Math.round(s4c4o.val).toLocaleString(); } }, 6.5);
tl.to(s4c5o, { val: 12, duration: 1.2, ease: "power2.out", onUpdate: function() { s4c5.innerText = Math.round(s4c5o.val).toLocaleString(); } }, 6.5);

window.__timelines["s4-stack"] = tl;
</script>
