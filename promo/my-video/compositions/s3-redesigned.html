var hdIds = ["s3-hd-1","s3-hd-2","s3-hd-3","s3-hd-4","s3-hd-5","s3-hd-6"];

msgTimes.forEach(function(t, i) {
  var msgId = "#s3-msg-a" + (i+1);
  var chkId = "#s3-chk-" + (i+1);
  var nnId = "#" + nnIds[i];
  var hdId = "#" + hdIds[i];
  var checkTime = t + 0.3;
  var nodeTime = t + 0.45;

  tl.fromTo(msgId, { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" }, t);
  tl.to(msgId + " .s3-msg-ts", { opacity: 1, duration: 0.2, ease: "power2.out" }, t + 0.2);
  tl.to(chkId, { opacity: 1, scale: 1.3, duration: 0.2, ease: "back.out(2.5)" }, checkTime);
  tl.to(hdId, { backgroundColor: "#1f1d3d", duration: 0.15, ease: "power2.out" }, checkTime);

  // Neural node: activate + glow pulse
  tl.to(nnId + " .s3-nn-circle", { borderColor: "currentColor", duration: 0.15, ease: "power2.out" }, nodeTime);
  tl.to(nnId + " .s3-nn-inner", { backgroundColor: "currentColor", duration: 0.15, ease: "power2.out" }, nodeTime);
  tl.fromTo(nnId + " .s3-nn-glow-ring", { scale: 0.3, opacity: 0 }, { scale: 1.4, opacity: 1, duration: 0.4, ease: "power2.out" }, nodeTime);
  tl.to(nnId + " .s3-nn-glow-ring", { opacity: 0, duration: 0.5, ease: "power2.out" }, nodeTime + 0.4);

  // Connecting line (skip for first node)
  if (i > 0) {
    tl.to("#" + ncIds[i-1] + " .s3-nn-line-fill", { scaleY: 1, duration: 0.3, ease: "power2.out" }, nodeTime - 0.1);
  }
});

// === Phase 4: Transition to score reveal (4.8-6.3) ===
// Typing indicator fades, avatar smiles
tl.to("#s3-typing-area", { opacity: 0, duration: 0.2, ease: "power2.out" }, 4.8);
var avatarObj = { idx: 0 };
tl.to(avatarObj, { idx: 1, duration: 0.01, ease: "none", onComplete: function() { document.getElementById("s3-avatar").textContent = "🙂"; } }, 5.0);

// Panels slide up and fade (5.5-6.3)
tl.to("#s3-panels", { y: -120, opacity: 0, duration: 0.8, ease: "power2.in" }, 5.5);
tl.to(".s3-progress-fill", { scaleX: 0.45, duration: 0.01, ease: "none" }, 5.5);

// Student moves center
tl.to("#s3-student-area", { left: "50%", bottom: "50%", xPercent: -50, yPercent: -50, duration: 0.5, ease: "power2.inOut" }, 5.8);

// === Phase 5: Score reveal theater (6.3-8.5) ===
tl.fromTo("#s3-score-bg", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out" }, 6.3);
tl.fromTo("#s3-score-gauge", { scale: 0.3, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.7)" }, 6.3);
tl.fromTo("#s3-score-title", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 6.5);

// Gauge fill via proxy
var gaugeObj = { deg: 0 };
tl.to(gaugeObj, { deg: 331, duration: 1.2, ease: "power2.out", onUpdate: function() {
  var d = Math.round(gaugeObj.deg);
  document.getElementById("s3-gauge-ring").style.background =
    "conic-gradient(#1f1d3d 0deg " + d + "deg, rgba(255,255,255,0.25) " + d + "deg 360deg)";
} }, 6.5);

// Counter 0→92
var scoreEl = document.getElementById("s3-score-num");
var scoreObj = { val: 0 };
tl.to(scoreObj, { val: 92, duration: 1.2, ease: "power2.out", onUpdate: function() { scoreEl.textContent = Math.round(scoreObj.val); } }, 6.5);

// Particle burst at ~6.8
burstIds.forEach(function(id, i) {
  var angle = burstAngles[i] * Math.PI / 180;
  var radius = burstRadii[i];
  var tx = Math.cos(angle) * radius;
  var ty = Math.sin(angle) * radius;
  tl.fromTo("#" + id, { scale: 0, opacity: 1, x: 0, y: 0 }, { scale: 1.2, opacity: 0, x: tx, y: ty, duration: 0.7, ease: "power2.out" }, 6.7);
});

// Detail labels stagger in
tl.fromTo("#s3-details", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 7.5);
tl.fromTo(".s3-detail", { opacity: 0, y: 10, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.3, ease: "back.out(1.3)", stagger: 0.08 }, 7.6);

// CTA button spring-pops in
tl.fromTo("#s3-cta", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.5)" }, 8.0);
tl.fromTo("#s3-cta-glow", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" }, 8.0);
// CTA glow pulse
tl.to("#s3-cta-glow", { opacity: 0.6, duration: 1.0, yoyo: true, repeat: 4, ease: "sine.inOut" }, 8.4);

// === Phase 6: Saved + final (8.5-12.0) ===
// Avatar changes
tl.to(avatarObj, { idx: 2, duration: 0.01, ease: "none", onComplete: function() { document.getElementById("s3-avatar").textContent = "😊"; } }, 8.5);
tl.fromTo("#s3-saved-area", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 9.0);
tl.to(avatarObj, { idx: 3, duration: 0.01, ease: "none", onComplete: function() { document.getElementById("s3-avatar").textContent = "😄"; } }, 10.5);

// Progress bar reaches end
tl.fromTo("#s3-progress-fill", { scaleX: 0 }, { scaleX: 1, duration: 12, ease: "none" }, 0);

window.__timelines["s3-redesigned"] = tl;
</script>
</template>
</body>
</html>
